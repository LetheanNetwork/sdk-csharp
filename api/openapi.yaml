components:
  headers:
    apiDeprecationNoticeURL:
      description: URL pointing to a detailed deprecation notice.
      explode: false
      schema:
        format: uri
        type: string
      style: simple
    apiSuggestedReplacement:
      description: Suggested replacement endpoint for clients to migrate to.
      explode: false
      schema:
        type: string
      style: simple
    deprecation:
      description: Indicates that the endpoint is deprecated.
      explode: false
      schema:
        enum:
        - "true"
        type: string
      style: simple
    link:
      description: "Reference to the successor endpoint, when one is provided."
      explode: false
      schema:
        type: string
      style: simple
    sunset:
      description: The date and time after which the endpoint will no longer be supported.
      explode: false
      schema:
        format: date-time
        type: string
      style: simple
    xapiwarn:
      description: Human-readable deprecation warning for clients.
      explode: false
      schema:
        type: string
      style: simple
  responses:
    BadRequest:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/get_health_429_response"
      description: Bad request
      headers:
        X-Request-ID:
          description: Request identifier propagated from the client or generated
            by the server
          explode: false
          schema:
            type: string
          style: simple
    Forbidden:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/get_health_429_response"
      description: Forbidden
      headers:
        X-Request-ID:
          description: Request identifier propagated from the client or generated
            by the server
          explode: false
          schema:
            type: string
          style: simple
    GatewayTimeout:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/get_health_429_response"
      description: Gateway timeout
      headers:
        X-Request-ID:
          description: Request identifier propagated from the client or generated
            by the server
          explode: false
          schema:
            type: string
          style: simple
    Gone:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/get_health_429_response"
      description: Gone

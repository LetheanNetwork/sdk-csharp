openapi: 3.1.0
info:
  description: "Lethean Desktop HTTP gateway — same surface the WebView reaches via\
    \ Wails bindings, exposed to external clients and the plugin market."
  title: lthn API
  version: 0.1.0
servers:
- url: /
tags:
- description: System endpoints
  name: system
- description: runner endpoints
  name: runner
paths:
  /health:
    get:
      description: Returns server health status
      operationId: get_health
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/get_health_200_response"
          description: Server is healthy
          headers:
            X-RateLimit-Limit:
              description: Maximum number of requests allowed in the current window
              explode: false
              schema:
                minimum: 1
                type: integer
              style: simple
            X-RateLimit-Remaining:
              description: Number of requests remaining in the current window
              explode: false
              schema:
                minimum: 0
                type: integer
              style: simple
            X-RateLimit-Reset:
              description: Unix timestamp when the rate limit window resets
              explode: false
              schema:
                minimum: 1
                type: integer
              style: simple
            X-Request-ID:
              description: Request identifier propagated from the client or generated
                by the server
              explode: false
              schema:
                type: string
              style: simple
        "429":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/get_health_429_response"
          description: Too many requests
          headers:
            Retry-After:
              description: Seconds until the rate limit resets
              explode: false
              schema:
                minimum: 1
                type: integer
              style: simple
            X-RateLimit-Limit:
